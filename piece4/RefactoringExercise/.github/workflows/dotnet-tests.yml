name: .NET Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore piece4/RefactoringExercise
    
    - name: Build
      run: dotnet build --no-restore --configuration Release piece4/RefactoringExercise
    
    - name: Run Unit Tests
      run: dotnet test piece4/RefactoringExercise/tests/OrderApi.Tests/OrderApi.Tests.csproj --configuration Release --verbosity normal
