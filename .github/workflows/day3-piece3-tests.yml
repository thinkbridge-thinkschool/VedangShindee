name: Day3 Piece3 — Quotes API Integration Tests

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'Day3/piece3/**'
      - '.github/workflows/day3-piece3-tests.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'Day3/piece3/**'
      - '.github/workflows/day3-piece3-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Day3/piece3

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test QuotesApi.Tests/QuotesApi.Tests.csproj --no-build --configuration Release --verbosity normal
