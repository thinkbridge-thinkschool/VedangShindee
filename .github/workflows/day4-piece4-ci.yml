name: CI – Day 4 Piece 4 (Serilog + Correlation IDs)

on:
  push:
    paths:
      - 'Day4/piece4/**'
      - '.github/workflows/day4-piece4-ci.yml'
  pull_request:
    paths:
      - 'Day4/piece4/**'
      - '.github/workflows/day4-piece4-ci.yml'

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: |
          dotnet restore Day4/piece4/QuotesApi/QuotesApi.csproj
          dotnet restore Day4/piece4/Quotes.Tests.Unit/Quotes.Tests.Unit.csproj
          dotnet restore Day4/piece4/QuotesApi.Tests/QuotesApi.Tests.csproj
          dotnet restore Day4/piece4/Quotes.Tests.Integration/Quotes.Tests.Integration.csproj

      - name: Build
        run: |
          dotnet build Day4/piece4/QuotesApi/QuotesApi.csproj --no-restore
          dotnet build Day4/piece4/Quotes.Tests.Unit/Quotes.Tests.Unit.csproj --no-restore
          dotnet build Day4/piece4/QuotesApi.Tests/QuotesApi.Tests.csproj --no-restore
          dotnet build Day4/piece4/Quotes.Tests.Integration/Quotes.Tests.Integration.csproj --no-restore

      - name: Test – unit
        run: |
          dotnet test Day4/piece4/Quotes.Tests.Unit \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults/unit \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*]*.Migrations.*,[*]Program"

      - name: Test – integration (SQLite)
        run: |
          dotnet test Day4/piece4/QuotesApi.Tests \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults/integration \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*]*.Migrations.*,[*]Program"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: TestResults/**/coverage.cobertura.xml
